# Core components (authentication, lock screen, notification daemon)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle

# Bar, wallpaper
exec-once = ~/.config/hypr/hyprland/scripts/start_geoclue_agent.sh
exec-once = sleep 1.5 && /etc/profiles/per-user/nondeus/bin/qs -c $qsConfig > /tmp/qs-autostart.log 2>&1
exec-once = ~/.config/hypr/custom/scripts/__restore_video_wallpaper.sh

# Audio
exec-once = easyeffects --hide-window --service-mode

# Clipboard: history
# exec-once = wl-paste --watch cliphist store
exec-once = sleep 10 && wl-paste --type text --watch bash -c 'cliphist store && /etc/profiles/per-user/nondeus/bin/qs -c $qsConfig ipc call cliphistService update'
exec-once = sleep 10 && wl-paste --type image --watch bash -c 'cliphist store && /etc/profiles/per-user/nondeus/bin/qs -c $qsConfig ipc call cliphistService update'

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Fix dock pinned apps not launching properly (https://github.com/end-4/dots-hyprland/issues/2200)
# This causes https://github.com/end-4/dots-hyprland/issues/2427
# exec-once = sleep 3.5 && hyprctl reload && sleep 0.5 && touch ~/.config/quickshell/ii/shell.qml
exec-once = awww-daemon --format xrgb
