# Core components (authentication, lock screen, notification daemon)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE QML2_IMPORT_PATH QML_IMPORT_PATH QT_PLUGIN_PATH
exec-once = uwsm app -- gnome-keyring-daemon --start --components=secrets
exec-once = uwsm app -- hypridle

# Bar, wallpaper
exec-once = ~/.config/hypr/hyprland/scripts/start_geoclue_agent.sh
exec-once = uwsm app -- env XDG_DATA_DIRS=/run/current-system/sw/share:/etc/profiles/per-user/$USER/share:$XDG_DATA_DIRS bash -c "sleep 1 && qs -c $qsConfig"
exec-once = ~/.config/quickshell/ii/scripts/colors/switchwall.sh --noswitch
exec-once = ~/.config/hypr/custom/scripts/__restore_video_wallpaper.sh

# Audio
exec-once = uwsm app -- easyeffects --hide-window --service-mode

# Clipboard: history
exec-once = sleep 10 && uwsm app -- wl-paste --type text --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = sleep 10 && uwsm app -- wl-paste --type image --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

exec-once = uwsm app -- awww-daemon --format xrgb

# Finalize session setup
exec-once = uwsm finalize
